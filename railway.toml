# Monorepo: set Railway Root Directory to voice_agent/ so Nixpacks sees Python.
# This file applies when the service root is the repo root; prefer voice_agent/railway.toml.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd voice_agent && python3.11 main.py"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
